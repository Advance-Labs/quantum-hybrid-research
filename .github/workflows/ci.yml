# Repository CI for quantum-hybrid-research.
#
# Deliberately minimal: numpy + pyyaml + pytest only. We do NOT install
# torch or pennylane in CI -- the heavy ML/QML stacks are optional runtime
# extras for the simulation scripts, and every module in this repo is
# written so its import-time path and its numpy-only modes (--table-only,
# py_compile, pytest under quantum-linux/) work without them. Installing
# them would add gigabytes and minutes for zero additional coverage.

name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime deps (numpy/pyyaml only -- no torch/pennylane, see header comment)
        run: python -m pip install --upgrade pip && python -m pip install numpy pyyaml pytest

      - name: Byte-compile every .py file in the repo
        run: |
          find . -path ./.git -prune -o -name '*.py' -print0 \
            | xargs -0 python -m py_compile

      - name: Run quantum-linux test suite (auto-discovers all test files)
        run: python -m pytest quantum-linux/ -v

      - name: Smoke-run numpy-only mode of complexity_analysis
        run: python qml-accelerator/benchmarks/complexity_analysis.py --table-only

      - name: Smoke-run numpy-only mode of power_model
        run: python hybrid-board/scheduler/power_model.py --table-only

  c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax-check the qsyscall ABI header
        run: cc -fsyntax-only quantum-linux/kernel-patches/qsyscall.h

      - name: Build and run the scheduler demo
        run: |
          cc -std=c11 -Wall -Wextra -Werror -DQSCHED_DEMO \
            -o /tmp/d hybrid-board/scheduler/quantum_scheduler.c
          /tmp/d

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate QISA spec parses as YAML
        run: |
          python -m pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('quantum-linux/isa-spec/QISA-v0.1.yaml'))"
